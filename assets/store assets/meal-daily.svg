<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#e8f4e8"/>
  <!-- plate -->
  <circle cx="200" cy="165" r="105" fill="#fff" stroke="#c8dfc8" stroke-width="3"/>
  <circle cx="200" cy="165" r="88" fill="#f7faf7" stroke="#ddeedd" stroke-width="1.5"/>
  <!-- rice/grain mound -->
  <ellipse cx="195" cy="175" rx="52" ry="30" fill="#f5e6b0"/>
  <ellipse cx="195" cy="167" rx="46" ry="22" fill="#f9eecc"/>
  <!-- broccoli -->
  <circle cx="155" cy="148" r="16" fill="#4a9e4a"/>
  <circle cx="145" cy="140" r="12" fill="#5ab55a"/>
  <circle cx="162" cy="138" r="11" fill="#3d8e3d"/>
  <rect x="153" y="158" width="4" height="14" fill="#6ab06a"/>
  <!-- carrot slices -->
  <ellipse cx="250" cy="150" rx="14" ry="9" fill="#f07030" transform="rotate(-20,250,150)"/>
  <ellipse cx="266" cy="158" rx="13" ry="8" fill="#e86020" transform="rotate(10,266,158)"/>
  <!-- peas -->
  <circle cx="228" cy="192" r="6" fill="#5ab55a"/>
  <circle cx="242" cy="196" r="5.5" fill="#4aaa4a"/>
  <circle cx="215" cy="197" r="5" fill="#60bb60"/>
  <!-- fork -->
  <rect x="120" y="90" width="5" height="60" rx="2.5" fill="#b0b8c0"/>
  <rect x="115" y="90" width="3" height="24" rx="1.5" fill="#b0b8c0"/>
  <rect x="122" y="90" width="3" height="24" rx="1.5" fill="#b0b8c0"/>
  <rect x="129" y="90" width="3" height="24" rx="1.5" fill="#b0b8c0"/>
  <!-- knife -->
  <rect x="272" y="90" width="5" height="60" rx="2.5" fill="#b0b8c0"/>
  <polygon points="272,90 277,90 277,110 272,118" fill="#d0d8e0"/>
  <!-- label -->
  <rect x="100" y="255" width="200" height="32" rx="6" fill="#2a6e2a"/>
  <text x="200" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" letter-spacing="1">DAILY MEALS — DAY DRILLS</text>
</svg>
