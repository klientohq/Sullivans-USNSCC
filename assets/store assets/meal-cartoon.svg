<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480">
  <rect width="560" height="480" fill="#ffffff"/>

  <!-- Plate shadow -->
  <ellipse cx="280" cy="420" rx="240" ry="28" fill="#d8d8d8" opacity="0.5"/>

  <!-- Outer plate rim -->
  <ellipse cx="280" cy="255" rx="255" ry="195" fill="#e4ece4"/>
  <ellipse cx="280" cy="250" rx="252" ry="192" fill="#dce8dc"/>
  <!-- Plate rim highlight -->
  <ellipse cx="220" cy="120" rx="90" ry="28" fill="white" opacity="0.35" transform="rotate(-20,220,120)"/>

  <!-- Inner plate (teal-grey) -->
  <ellipse cx="280" cy="250" rx="222" ry="165" fill="#b8cfbc"/>
  <ellipse cx="280" cy="248" rx="218" ry="161" fill="#bdd4c0"/>

  <!-- === STEAK (top left) === -->
  <ellipse cx="158" cy="200" rx="72" ry="52" fill="#2e1206" transform="rotate(-8,158,200)"/>
  <ellipse cx="155" cy="196" rx="65" ry="45" fill="#4a1c08" transform="rotate(-8,155,196)"/>
  <ellipse cx="153" cy="193" rx="55" ry="37" fill="#5c220a" transform="rotate(-8,153,193)"/>
  <!-- Steak grill marks -->
  <line x1="128" y1="182" x2="142" y2="210" stroke="#2a0e04" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="146" y1="176" x2="160" y2="205" stroke="#2a0e04" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="164" y1="172" x2="178" y2="200" stroke="#2a0e04" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Steak highlight -->
  <ellipse cx="145" cy="188" rx="22" ry="12" fill="#7a3010" opacity="0.5" transform="rotate(-8,145,188)"/>

  <!-- === FRENCH FRIES (top center) === -->
  <g transform="rotate(-5,280,195)">
    <rect x="226" y="148" width="16" height="70" rx="5" fill="#f0c030"/>
    <rect x="245" y="140" width="16" height="78" rx="5" fill="#e8b828"/>
    <rect x="264" y="145" width="16" height="72" rx="5" fill="#f0c030"/>
    <rect x="283" y="138" width="16" height="80" rx="5" fill="#e8b828"/>
    <rect x="302" y="143" width="16" height="74" rx="5" fill="#f0c030"/>
    <rect x="321" y="141" width="14" height="76" rx="5" fill="#e8b828"/>
    <!-- Fry tips (darker/browned) -->
    <rect x="226" y="148" width="16" height="14" rx="5" fill="#c88a20"/>
    <rect x="245" y="140" width="16" height="14" rx="5" fill="#c88a20"/>
    <rect x="264" y="145" width="16" height="14" rx="5" fill="#c88a20"/>
    <rect x="283" y="138" width="16" height="14" rx="5" fill="#c88a20"/>
    <rect x="302" y="143" width="16" height="14" rx="5" fill="#c88a20"/>
    <rect x="321" y="141" width="14" height="14" rx="5" fill="#c88a20"/>
  </g>

  <!-- === RICE (top right) === -->
  <ellipse cx="398" cy="210" rx="64" ry="50" fill="#e8e0c0"/>
  <!-- Rice grain texture -->
  <ellipse cx="378" cy="198" rx="9" ry="3.5" fill="#d0c8a8" transform="rotate(25,378,198)"/>
  <ellipse cx="395" cy="192" rx="9" ry="3.5" fill="#d8d0b0" transform="rotate(-10,395,192)"/>
  <ellipse cx="412" cy="196" rx="9" ry="3.5" fill="#d0c8a8" transform="rotate(40,412,196)"/>
  <ellipse cx="384" cy="208" rx="9" ry="3.5" fill="#d8d0b0" transform="rotate(-30,384,208)"/>
  <ellipse cx="402" cy="208" rx="9" ry="3.5" fill="#d0c8a8" transform="rotate(15,402,208)"/>
  <ellipse cx="418" cy="215" rx="9" ry="3.5" fill="#d8d0b0" transform="rotate(-5,418,215)"/>
  <ellipse cx="376" cy="218" rx="9" ry="3.5" fill="#d0c8a8" transform="rotate(35,376,218)"/>
  <ellipse cx="392" cy="222" rx="9" ry="3.5" fill="#d8d0b0" transform="rotate(-20,392,222)"/>
  <ellipse cx="408" cy="226" rx="8" ry="3" fill="#d0c8a8" transform="rotate(10,408,226)"/>
  <ellipse cx="385" cy="233" rx="8" ry="3" fill="#d8d0b0" transform="rotate(-15,385,233)"/>
  <ellipse cx="401" cy="235" rx="8" ry="3" fill="#d0c8a8" transform="rotate(28,401,235)"/>
  <ellipse cx="418" cy="230" rx="7" ry="3" fill="#d8d0b0" transform="rotate(-8,418,230)"/>
  <ellipse cx="370" cy="204" rx="7" ry="2.5" fill="#d0c8a8" transform="rotate(20,370,204)"/>
  <ellipse cx="424" cy="202" rx="7" ry="2.5" fill="#d8d0b0" transform="rotate(-25,424,202)"/>

  <!-- === FRIED EGG (center) === -->
  <!-- Egg white (irregular organic blob) -->
  <ellipse cx="278" cy="268" rx="68" ry="48" fill="#f5f0e5"/>
  <ellipse cx="265" cy="275" rx="52" ry="35" fill="#fffcf0"/>
  <ellipse cx="290" cy="260" rx="48" ry="32" fill="#fffcf0"/>
  <!-- Yolk -->
  <circle cx="278" cy="268" r="28" fill="#f0a800"/>
  <circle cx="278" cy="268" r="28" fill="none" stroke="#e09500" stroke-width="2.5"/>
  <!-- Yolk shine -->
  <circle cx="270" cy="260" r="9" fill="#ffd860" opacity="0.75"/>
  <circle cx="266" cy="257" r="4" fill="white" opacity="0.5"/>

  <!-- === BLACK BEANS (bottom center-right) === -->
  <ellipse cx="370" cy="320" rx="75" ry="45" fill="#1e0f06"/>
  <ellipse cx="368" cy="316" rx="68" ry="40" fill="#2a1208"/>
  <!-- Bean bubbles -->
  <circle cx="345" cy="308" r="7" fill="#1a0a04" opacity="0.8"/>
  <circle cx="362" cy="300" r="6" fill="#1a0a04" opacity="0.8"/>
  <circle cx="380" cy="306" r="8" fill="#1a0a04" opacity="0.8"/>
  <circle cx="395" cy="315" r="6" fill="#1a0a04" opacity="0.8"/>
  <circle cx="352" cy="320" r="7" fill="#1a0a04" opacity="0.8"/>
  <circle cx="370" cy="328" r="6" fill="#1a0a04" opacity="0.8"/>
  <circle cx="388" cy="324" r="7" fill="#1a0a04" opacity="0.8"/>
  <circle cx="408" cy="308" r="5" fill="#1a0a04" opacity="0.8"/>
  <!-- Bean shine -->
  <ellipse cx="360" cy="305" rx="20" ry="8" fill="#4a2010" opacity="0.4"/>

  <!-- === SPINACH / ARUGULA (bottom left) === -->
  <!-- Large leaf 1 -->
  <ellipse cx="148" cy="318" rx="48" ry="28" fill="#2d7a22" transform="rotate(-25,148,318)"/>
  <path d="M 120 305 Q 148 280 175 308" stroke="#1a5514" stroke-width="2" fill="none"/>
  <path d="M 125 318 Q 148 295 170 320" stroke="#1a5514" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Large leaf 2 -->
  <ellipse cx="170" cy="340" rx="42" ry="24" fill="#38922c" transform="rotate(15,170,340)"/>
  <path d="M 148 338 Q 170 318 192 340" stroke="#1a5514" stroke-width="1.5" fill="none"/>
  <!-- Small leaf -->
  <ellipse cx="132" cy="342" rx="28" ry="18" fill="#248a18" transform="rotate(-40,132,342)"/>
  <!-- Leaf stems -->
  <line x1="148" y1="330" x2="148" y2="355" stroke="#1a5514" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="165" y1="348" x2="165" y2="368" stroke="#1a5514" stroke-width="2" stroke-linecap="round"/>

  <!-- === TOMATO SLICES (bottom center-left) === -->
  <!-- Back tomato slice -->
  <circle cx="228" cy="342" r="32" fill="#cc2020"/>
  <circle cx="228" cy="342" r="32" fill="none" stroke="#8a1010" stroke-width="3"/>
  <line x1="228" y1="310" x2="228" y2="374" stroke="#8a1010" stroke-width="2" opacity="0.5"/>
  <line x1="196" y1="342" x2="260" y2="342" stroke="#8a1010" stroke-width="2" opacity="0.5"/>
  <line x1="205" y1="319" x2="251" y2="365" stroke="#8a1010" stroke-width="1.5" opacity="0.4"/>
  <line x1="251" y1="319" x2="205" y2="365" stroke="#8a1010" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="218" cy="334" rx="7" ry="4" fill="#ff9080" opacity="0.6"/>
  <ellipse cx="238" cy="352" rx="7" ry="4" fill="#ff9080" opacity="0.6"/>
  <!-- Front tomato slice -->
  <circle cx="248" cy="360" r="30" fill="#e02222"/>
  <circle cx="248" cy="360" r="30" fill="none" stroke="#8a1010" stroke-width="3"/>
  <line x1="248" y1="330" x2="248" y2="390" stroke="#8a1010" stroke-width="2" opacity="0.5"/>
  <line x1="218" y1="360" x2="278" y2="360" stroke="#8a1010" stroke-width="2" opacity="0.5"/>
  <line x1="227" y1="339" x2="269" y2="381" stroke="#8a1010" stroke-width="1.5" opacity="0.4"/>
  <line x1="269" y1="339" x2="227" y2="381" stroke="#8a1010" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="238" cy="352" rx="6" ry="3.5" fill="#ff9080" opacity="0.6"/>
  <ellipse cx="258" cy="368" rx="6" ry="3.5" fill="#ff9080" opacity="0.6"/>
</svg>
