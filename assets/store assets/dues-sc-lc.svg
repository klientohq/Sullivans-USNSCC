<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#f5f0e8"/>
  <!-- Envelope body -->
  <rect x="40" y="80" width="320" height="200" rx="8" ry="8" fill="#fff" stroke="#d4c9b0" stroke-width="2.5"/>
  <!-- Envelope flap (open) -->
  <polygon points="40,80 200,175 360,80" fill="#fffdf7" stroke="#d4c9b0" stroke-width="2.5"/>
  <!-- Envelope flap lines -->
  <line x1="40" y1="280" x2="200" y2="175" stroke="#d4c9b0" stroke-width="1.5"/>
  <line x1="360" y1="280" x2="200" y2="175" stroke="#d4c9b0" stroke-width="1.5"/>
  <!-- Stamp box -->
  <rect x="295" y="100" width="45" height="55" rx="3" fill="none" stroke="#c0a020" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- Anchor in stamp -->
  <text x="317" y="134" text-anchor="middle" font-size="28" fill="#1a3a6b">⚓</text>
  <!-- Lines on envelope body for text feel -->
  <line x1="80" y1="175" x2="240" y2="175" stroke="#e0d8c8" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="220" y2="195" stroke="#e0d8c8" stroke-width="1.5"/>
  <line x1="80" y1="215" x2="200" y2="215" stroke="#e0d8c8" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="60" y="155" width="215" height="80" rx="4" fill="#1a3a6b" opacity="0.06"/>
  <text x="167" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a3a6b" letter-spacing="0.5">SEA CADET /</text>
  <text x="167" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a3a6b" letter-spacing="0.5">LEAGUE CADET DUES</text>
  <text x="167" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0a020" font-weight="700" letter-spacing="1">$150.00 ANNUALLY</text>
</svg>
