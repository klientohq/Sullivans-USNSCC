<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#e8eef5"/>
  <!-- tray base -->
  <rect x="55" y="90" width="290" height="175" rx="10" fill="#d8e4f0" stroke="#b8cce0" stroke-width="2"/>
  <!-- tray compartments outline -->
  <rect x="70" y="103" width="120" height="90" rx="6" fill="#fff" stroke="#c0d4e8" stroke-width="1.5"/>
  <rect x="205" y="103" width="125" height="90" rx="6" fill="#fff" stroke="#c0d4e8" stroke-width="1.5"/>
  <rect x="70" y="205" width="260" height="45" rx="6" fill="#fff" stroke="#c0d4e8" stroke-width="1.5"/>
  <!-- left compartment: mashed potato mound -->
  <ellipse cx="130" cy="155" rx="42" ry="25" fill="#f5e9c0"/>
  <ellipse cx="130" cy="147" rx="36" ry="18" fill="#f9f0d0"/>
  <!-- gravy pool -->
  <ellipse cx="130" cy="160" rx="28" ry="10" fill="#c8853a" opacity="0.5"/>
  <!-- right compartment: chicken piece -->
  <ellipse cx="268" cy="155" rx="48" ry="32" fill="#d4944a"/>
  <ellipse cx="268" cy="150" rx="40" ry="24" fill="#e0a855"/>
  <!-- grill marks -->
  <line x1="252" y1="140" x2="260" y2="168" stroke="#b87030" stroke-width="3" stroke-linecap="round"/>
  <line x1="264" y1="138" x2="272" y2="166" stroke="#b87030" stroke-width="3" stroke-linecap="round"/>
  <line x1="276" y1="140" x2="284" y2="166" stroke="#b87030" stroke-width="3" stroke-linecap="round"/>
  <!-- bottom compartment: mixed veg -->
  <circle cx="100" cy="227" r="9" fill="#4a9e4a"/>
  <circle cx="118" cy="224" r="8" fill="#f07030"/>
  <circle cx="135" cy="228" r="7" fill="#f5e060"/>
  <circle cx="151" cy="224" r="9" fill="#5ab55a"/>
  <circle cx="168" cy="228" r="8" fill="#f07030"/>
  <circle cx="185" cy="224" r="7" fill="#4a9e4a"/>
  <circle cx="202" cy="228" r="8" fill="#f5e060"/>
  <circle cx="219" cy="225" r="7" fill="#5ab55a"/>
  <circle cx="235" cy="228" r="9" fill="#f07030"/>
  <circle cx="252" cy="224" r="7" fill="#4a9e4a"/>
  <circle cx="268" cy="228" r="8" fill="#f5e060"/>
  <circle cx="284" cy="225" r="7" fill="#5ab55a"/>
  <!-- label -->
  <rect x="80" y="8" width="240" height="38" rx="7" fill="#1a3a6b"/>
  <text x="200" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fff" letter-spacing="0.8">OVERNIGHT MEALS</text>
  <text x="200" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c0a020" font-weight="700" letter-spacing="1">WEEKEND DRILLS</text>
</svg>
