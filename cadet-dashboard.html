<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadet Login Preview | The Sullivans USNSCC</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel">
        <a class="brand login-brand" href="./index.html">
          <img src="./assets/images/logo.webp" alt="The Sullivans Division USNSCC logo" />
          <span>
            <strong>The Sullivans</strong>
            <small>Cadet Dashboard Preview</small>
          </span>
        </a>
        <h1>Cadet dashboard coming next.</h1>
        <p>
          This page reserves the login path for the larger standalone site. Later, cadets can sign in here for internal
          resources, announcements, drill information, and forms.
        </p>
        <form class="login-form">
          <label for="email">Email or Cadet ID</label>
          <input id="email" type="text" placeholder="cadet@example.com" autocomplete="username" />
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          <button class="button primary" type="button">Preview Only</button>
        </form>
        <a class="back-link" href="./index.html">Return to public site</a>
        <a class="back-link" href="./store.html">Open store preview</a>
      </section>
    </main>
  </body>
</html>
